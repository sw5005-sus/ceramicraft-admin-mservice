services:
  mysql:
    image: mysql:8.0
    container_name: mysql-container
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: admin_db
    # Pure memory, disappears when CI ends
    tmpfs: /var/lib/mysql
    networks:
      ci-net:
        aliases:
          - mysql-container
  
  redis-container:
    image: redis:7.0
    container_name: redis-container
    ports:
      - "6379:6379"
    networks:
      ci-net:
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 2s
      retries: 5

  ceramicraft-admin-mservice:
    build:
      context: ../../server
      dockerfile: Dockerfile
    container_name: ceramicraft-admin-mservice
    environment:
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
    depends_on:
      - mysql
      - redis-container
    networks:
      - ci-net
    ports:
      - "8080:8080"   # 只给宿主机（ZAP）用
    command: ["sh", "-c", "apk add --no-cache netcat-openbsd && chmod +x /app/wait-for.sh && ./wait-for.sh mysql-container 3306 ./main"]
    volumes:
      - ./wait-for.sh:/app/wait-for.sh   # CI 专用配置
    user: root
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/admin-ms/v1/ping"]
      interval: 10s
      timeout: 5s
      retries: 3
networks:
  ci-net:
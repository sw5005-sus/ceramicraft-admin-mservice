<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Risk User Review Management</title>
  <script src="https://unpkg.com/htmx.org@1.9.12" defer></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --color-primary:        #409EFF;
      --color-primary-light:  #ecf5ff;
      --color-primary-border: #b3d8ff;
      --color-success:        #67C23A;
      --color-warning:        #E6A23C;
      --color-danger:         #F56C6C;
      --color-info:           #909399;
      --color-text-primary:   #303133;
      --color-text-regular:   #606266;
      --color-text-secondary: #909399;
      --color-border:         #DCDFE6;
      --color-bg-page:        #f0f2f5;
      --color-bg-card:        #ffffff;
      --radius:               4px;
      --shadow:               0 2px 12px rgba(0,0,0,.10);
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
      font-size: 14px;
      color: var(--color-text-primary);
      background: var(--color-bg-page);
      min-height: 100vh;
    }
    /* ── Header ─────────────────────────────────────────────── */
    .page-header {
      background: var(--color-bg-card);
      padding: 0 24px;
      height: 60px;
      display: flex;
      align-items: center;
      border-bottom: 1px solid var(--color-border);
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
    }
    .page-header h1 { font-size: 18px; font-weight: 600; }
    /* ── Content ─────────────────────────────────────────────── */
    .page-content {
      max-width: 1440px;
      margin: 0 auto;
      padding: 20px 24px;
    }
    /* ── Card ────────────────────────────────────────────────── */
    .card {
      background: var(--color-bg-card);
      border-radius: var(--radius);
      border: 1px solid var(--color-border);
      margin-bottom: 16px;
      box-shadow: var(--shadow);
    }
    .card-body { padding: 20px; }
    /* ── Filter form ─────────────────────────────────────────── */
    .filter-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: flex-end;
    }
    .form-item { display: flex; flex-direction: column; gap: 6px; }
    .form-label { font-size: 12px; color: var(--color-text-secondary); font-weight: 500; }
    .form-input, .form-select {
      height: 32px;
      padding: 0 12px;
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      font-size: 13px;
      color: var(--color-text-primary);
      background: #fff;
      outline: none;
      transition: border-color .2s;
    }
    .form-input:focus, .form-select:focus { border-color: var(--color-primary); }
    .form-input[type="date"]   { padding: 0 8px; width: 148px; }
    .form-input[type="number"] { width: 120px; }
    .form-select { width: 164px; cursor: pointer; }
    /* ── Buttons ─────────────────────────────────────────────── */
    .btn {
      height: 32px;
      padding: 0 16px;
      border: 1px solid transparent;
      border-radius: var(--radius);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
      transition: all .2s;
    }
    .btn-primary { background: var(--color-primary); color: #fff; border-color: var(--color-primary); }
    .btn-primary:hover { background: #79bbff; border-color: #79bbff; }
    .btn-default { background: #fff; color: var(--color-text-regular); border-color: var(--color-border); }
    .btn-default:hover { color: var(--color-primary); border-color: var(--color-primary); background: var(--color-primary-light); }
    .btn-warning { background: #fdf6ec; color: var(--color-warning); border-color: #f5dab1; }
    .btn-warning:hover { background: var(--color-warning); color: #fff; border-color: var(--color-warning); }
    .btn-sm { height: 26px; padding: 0 10px; font-size: 12px; }
    /* ── Table ───────────────────────────────────────────────── */
    .table-wrapper { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    thead th {
      background: #f5f7fa;
      padding: 10px 12px;
      text-align: left;
      font-size: 13px;
      font-weight: 600;
      color: var(--color-text-secondary);
      border-bottom: 1px solid var(--color-border);
      white-space: nowrap;
    }
    tbody td {
      padding: 12px;
      border-bottom: 1px solid #f0f0f0;
      font-size: 13px;
      color: var(--color-text-regular);
      vertical-align: middle;
    }
    tbody tr:hover td { background: #f5f7fa; }
    tbody tr:last-child td { border-bottom: none; }
    /* ── Badges ──────────────────────────────────────────────── */
    .badge {
      display: inline-flex;
      align-items: center;
      height: 22px;
      padding: 0 8px;
      border-radius: 11px;
      font-size: 11px;
      font-weight: 600;
      white-space: nowrap;
    }
    .badge-warning  { background: #fdf6ec; color: var(--color-warning); border: 1px solid #f5dab1; }
    .badge-danger   { background: #fef0f0; color: var(--color-danger);  border: 1px solid #fbc4c4; }
    .badge-success  { background: #f0f9eb; color: var(--color-success); border: 1px solid #b3e19d; }
    .badge-info     { background: #f4f4f5; color: var(--color-info);    border: 1px solid #d3d4d6; }
    .badge-default  { background: #f4f4f5; color: var(--color-info);    border: 1px solid #d3d4d6; }
    .badge-resolved { background: var(--color-primary-light); color: var(--color-primary); border: 1px solid var(--color-primary-border); }
    /* ── Pagination ──────────────────────────────────────────── */
    .pagination {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 16px 16px 4px;
      gap: 8px;
    }
    .pagination-info { color: var(--color-text-secondary); font-size: 13px; }
    .page-btn {
      min-width: 32px;
      height: 32px;
      padding: 0 8px;
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      font-size: 13px;
      cursor: pointer;
      background: #fff;
      color: var(--color-text-regular);
      transition: all .2s;
    }
    .page-btn:hover:not(:disabled) { color: var(--color-primary); border-color: var(--color-primary); }
    .page-btn:disabled { color: #c0c4cc; cursor: not-allowed; background: #f5f7fa; }
    .page-btn.active { background: var(--color-primary); color: #fff; border-color: var(--color-primary); cursor: default; }
    /* ── Section header ──────────────────────────────────────── */
    .section-title {
      display: flex;
      align-items: center;
      padding: 14px 20px;
      border-bottom: 1px solid #f0f0f0;
      font-size: 15px;
      font-weight: 600;
      gap: 8px;
    }
    .total-badge {
      background: var(--color-primary-light);
      color: var(--color-primary);
      border: 1px solid var(--color-primary-border);
      border-radius: 10px;
      padding: 1px 8px;
      font-size: 12px;
      font-weight: 500;
    }
    /* ── Modal ───────────────────────────────────────────────── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.4);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .modal-container {
      background: var(--color-bg-card);
      border-radius: var(--radius);
      box-shadow: 0 8px 32px rgba(0,0,0,.15);
      width: 460px;
      max-width: calc(100vw - 32px);
    }
    .modal-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--color-border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .modal-header h3 { font-size: 16px; font-weight: 600; }
    .modal-close {
      width: 28px; height: 28px;
      border: none; background: none; cursor: pointer;
      font-size: 20px; color: var(--color-text-secondary);
      border-radius: var(--radius);
      display: flex; align-items: center; justify-content: center;
    }
    .modal-close:hover { background: #f5f7fa; color: var(--color-text-primary); }
    .modal-body { padding: 20px; }
    .modal-field {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
      align-items: center;
    }
    .modal-field-label {
      width: 110px;
      font-size: 13px;
      color: var(--color-text-secondary);
      text-align: right;
      flex-shrink: 0;
    }
    .modal-field-value { font-size: 13px; color: var(--color-text-primary); font-weight: 500; }
    .modal-field select {
      flex: 1;
      height: 32px;
      padding: 0 12px;
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      font-size: 13px;
      outline: none;
      background: #fff;
    }
    .modal-field select:focus { border-color: var(--color-primary); }
    .modal-footer {
      padding: 12px 20px;
      border-top: 1px solid var(--color-border);
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }
    .modal-result { padding: 0 20px 12px; min-height: 20px; }
    /* ── Alerts ──────────────────────────────────────────────── */
    .alert { padding: 8px 12px; border-radius: var(--radius); font-size: 13px; }
    .alert-success { background: #f0f9eb; color: var(--color-success); border: 1px solid #b3e19d; }
    .alert-error   { background: #fef0f0; color: var(--color-danger);  border: 1px solid #fbc4c4; }
    /* ── htmx loading indicator ──────────────────────────────── */
    .htmx-indicator { display: none; }
    .htmx-request .htmx-indicator,
    .htmx-request.htmx-indicator { display: inline-flex; }
    .spinner {
      width: 16px; height: 16px;
      border: 2px solid var(--color-border);
      border-top-color: var(--color-primary);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    /* ── Misc ────────────────────────────────────────────────── */
    .text-mono { font-family: 'Courier New', monospace; font-size: 12px; }
    .text-sm   { font-size: 12px; color: var(--color-text-secondary); }
    .empty-state { padding: 48px 0; text-align: center; color: var(--color-text-secondary); }
    .empty-icon  { font-size: 48px; margin-bottom: 12px; }
    @media (max-width: 768px) {
      .page-content { padding: 12px; }
      .filter-row   { flex-direction: column; }
    }
  </style>
</head>
<body>
  <!-- AUTH_TOKEN is embedded server-side so htmx AJAX calls can carry the Bearer token -->
  <script>var AUTH_TOKEN = "{{.token}}";</script>

  <header class="page-header">
    <h1>🔍 Risk User Review Management</h1>
  </header>

  <main class="page-content">

    <!-- ── Filter Card ──────────────────────────────────────── -->
    <div class="card">
      <div class="card-body">
        <form id="filter-form"
              hx-get="/admin-ms/v1/pages/risk-user-reviews/table"
              hx-target="#table-container"
              hx-trigger="submit"
              hx-indicator="#table-loading"
              hx-headers='js:{"Authorization": "Bearer " + AUTH_TOKEN}'>
          <div class="filter-row">
            <div class="form-item">
              <label class="form-label">User ID</label>
              <input class="form-input" type="number" name="user_id" placeholder="All users" min="0">
            </div>
            <div class="form-item">
              <label class="form-label">Decision</label>
              <select class="form-select" name="decision">
                <option value="">All</option>
                <option value="0">Unrecognized</option>
                <option value="1">Manual Review</option>
                <option value="2">Block</option>
                <option value="3">Watchlist</option>
                <option value="4">Allow</option>
                <option value="10">Resolved (Block)</option>
                <option value="11">Resolved (Whitelist)</option>
                <option value="12">Resolved (Watchlist)</option>
              </select>
            </div>
            <div class="form-item">
              <label class="form-label">Start Date</label>
              <input class="form-input" type="date" name="start_date">
            </div>
            <div class="form-item">
              <label class="form-label">End Date</label>
              <input class="form-input" type="date" name="end_date">
            </div>
            <div class="form-item">
              <label class="form-label">Page Size</label>
              <select class="form-select" name="page_size" style="width:100px">
                <option value="10">10</option>
                <option value="20" selected>20</option>
                <option value="50">50</option>
                <option value="100">100</option>
              </select>
            </div>
            <!-- hidden page field, updated by goToPage() -->
            <input type="hidden" name="page" value="1" id="filter-page">
            <div class="form-item">
              <div style="display:flex;gap:8px;margin-top:22px">
                <button class="btn btn-primary" type="submit">
                  <span class="htmx-indicator"><span class="spinner"></span></span>
                  Search
                </button>
                <button class="btn btn-default" type="button" onclick="resetFilter()">Reset</button>
              </div>
            </div>
          </div>
        </form>
      </div>
    </div>

    <!-- ── Results Card ─────────────────────────────────────── -->
    <div class="card">
      <!--
        hx-include pulls the filter form values so pagination and
        the refreshTable trigger both respect active filters.
      -->
      <div id="table-container"
           hx-get="/admin-ms/v1/pages/risk-user-reviews/table"
           hx-include="#filter-form"
           hx-trigger="load, refreshTable from:body"
           hx-indicator="#table-loading"
           hx-headers='js:{"Authorization": "Bearer " + AUTH_TOKEN}'>
        <div class="section-title">
          <span>Results</span>
          <span class="htmx-indicator" id="table-loading"><span class="spinner"></span></span>
        </div>
        <div style="padding:48px;text-align:center;color:var(--color-text-secondary)">
          Loading…
        </div>
      </div>
    </div>

  </main>

  <!-- ── Update Decision Modal ───────────────────────────────── -->
  <div id="update-modal" class="modal-overlay" style="display:none"
       onclick="handleOverlayClick(event)">
    <div class="modal-container" onclick="event.stopPropagation()">
      <div class="modal-header">
        <h3>Update Decision</h3>
        <button class="modal-close" onclick="closeModal()" type="button">×</button>
      </div>
      <form id="update-form"
            hx-post=""
            hx-target="#modal-result"
            hx-swap="innerHTML"
            hx-headers='js:{"Authorization": "Bearer " + AUTH_TOKEN}'>
        <div class="modal-body">
          <div class="modal-field">
            <span class="modal-field-label">Review ID:</span>
            <span class="modal-field-value" id="modal-review-id-display">—</span>
          </div>
          <div class="modal-field">
            <span class="modal-field-label">User ID:</span>
            <span class="modal-field-value" id="modal-user-id-display">—</span>
          </div>
          <div class="modal-field">
            <span class="modal-field-label">Current Decision:</span>
            <span id="modal-current-decision">—</span>
          </div>
          <div class="modal-field">
            <label class="modal-field-label" for="new-decision">New Decision:</label>
            <select class="form-select" name="decision" id="new-decision" style="flex:1;width:auto">
              <option value="10">Resolved (Block)</option>
              <option value="11">Resolved (Whitelist)</option>
              <option value="12">Resolved (Watchlist)</option>
            </select>
          </div>
          <input type="hidden" name="id"      id="modal-review-id-input">
          <input type="hidden" name="user_id" id="modal-user-id-input">
        </div>
        <div class="modal-result" id="modal-result"></div>
        <div class="modal-footer">
          <button class="btn btn-default" type="button" onclick="closeModal()">Cancel</button>
          <button class="btn btn-primary" type="submit">
            <span class="htmx-indicator"><span class="spinner"></span></span>
            Save
          </button>
        </div>
      </form>
    </div>
  </div>

  <script>
    // ── Modal helpers ──────────────────────────────────────────
    function openModal(reviewId, userId, decisionLabel, decisionClass) {
      document.getElementById('modal-review-id-display').textContent = reviewId;
      document.getElementById('modal-user-id-display').textContent   = userId;
      document.getElementById('modal-current-decision').innerHTML =
        '<span class="badge ' + decisionClass + '">' + decisionLabel + '</span>';
      document.getElementById('modal-review-id-input').value = reviewId;
      document.getElementById('modal-user-id-input').value   = userId;
      document.getElementById('modal-result').innerHTML = '';

      var form = document.getElementById('update-form');
      form.setAttribute('hx-post',
        '/admin-ms/v1/pages/risk-user-reviews/' + reviewId + '/decision');
      htmx.process(form);   // re-process so htmx picks up the updated hx-post

      document.getElementById('update-modal').style.display = 'flex';
    }

    function closeModal() {
      document.getElementById('update-modal').style.display = 'none';
    }

    function handleOverlayClick(e) {
      if (e.target === e.currentTarget) closeModal();
    }

    // ── Server-sent events ─────────────────────────────────────
    // HX-Trigger: updateSuccess → auto-close the modal after a short delay
    document.body.addEventListener('updateSuccess', function() {
      setTimeout(closeModal, 1200);
    });

    // ── Filter helpers ─────────────────────────────────────────
    function resetFilter() {
      document.getElementById('filter-form').reset();
      document.getElementById('filter-page').value = '1';
      htmx.trigger(document.getElementById('filter-form'), 'submit');
    }

    // Called by pagination buttons in the table partial
    function goToPage(page) {
      document.getElementById('filter-page').value = page;
      htmx.trigger(document.getElementById('filter-form'), 'submit');
    }
  </script>
</body>
</html>

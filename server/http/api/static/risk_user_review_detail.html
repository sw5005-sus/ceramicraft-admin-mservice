<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Risk User Review - Detail</title>
  <link rel="stylesheet" href="/admin-ms/v1/merchant/risk-user-reviews/risk_user_review.css?v=0.0.1" />
</head>
<body>
  <div id="app">
    <div class="page-header">
      <button id="backBtnTop" class="btn">← Back</button>
      <h2 style="display:inline; margin-left:10px;">Review Detail</h2>
    </div>

    <div id="notFoundCard" class="card" style="display:none;">
      <p>Data not found. Please return to list.</p>
    </div>

    <div id="detailCard" class="card" style="display:none;">
      <table class="desc-table">
        <tr><th>ID</th><td id="fieldId"></td><th>User ID</th><td id="fieldUserId"></td></tr>
        <tr><th>Create Time</th><td id="fieldCreateTime"></td><th>Decision</th><td id="fieldDecision"></td></tr>
        <tr><th>Risk Score</th><td id="fieldRiskScore"></td><th>Risk Level</th><td id="fieldRiskLevel"></td></tr>
        <tr><th>Rule Score</th><td id="fieldRuleScore"></td><th>Fraud Prob.</th><td id="fieldFraudProbability"></td></tr>
        <tr><th>Decision Source</th><td id="fieldDecisionSource" colspan="3"></td></tr>
        <tr><th>Analyst Summary</th><td id="fieldAnalystSummary" colspan="3"></td></tr>
        <tr><th>Rules Hit</th><td id="fieldRules" colspan="3"></td></tr>
      </table>
      <div class="action-bar">
        <button id="updateBtn" class="btn btn-warning" style="display:none;">Update Decision</button>
        <button id="backBtnBottom" class="btn">Return to List</button>
      </div>
    </div>
  </div>

  <div id="dialogMask" class="dialog-mask">
    <div class="dialog">
      <div class="dialog-header">Update Review</div>
      <div class="dialog-body">
        <label>New Decision: </label>
        <select id="newDecisionSelect" class="nice-select">
          <option value="10">Resolved - Block</option>
          <option value="11">Resolved - Whitelist</option>
          <option value="12">Resolved - Watchlist</option>
        </select>
      </div>
      <div class="dialog-footer">
        <button id="cancelDialogBtn" class="btn">Cancel</button>
        <button id="confirmDialogBtn" class="btn btn-primary">Confirm</button>
      </div>
    </div>
  </div>

  <div id="loadingMask" class="loading-mask">Loading...</div>
  <div id="toastWrap" class="toast-wrap"></div>

  <script src="/admin-ms/v1/merchant/risk-user-reviews/risk_user_review_detail.js?v=0.0.1"></script>
</body>
</html>

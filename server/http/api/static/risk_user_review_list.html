<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Risk User Review</title>
  <link rel="stylesheet" href="/admin-ms/v1/merchant/risk-user-reviews/risk_user_review.css?v=0.0.1" />
</head>
<body>
  <div id="app">
    <div class="page-header">Risk User Review</div>

    <div class="card">
      <div class="filter-row">
        <div class="filter-item">
          <label for="userIdInput">User ID</label>
          <input id="userIdInput" class="text-input" type="number" placeholder="User ID" />
        </div>

        <div class="filter-item">
          <label for="decisionSelect">Decision</label>
          <select id="decisionSelect" class="select-input w-180">
            <option value="">All</option>
          </select>
        </div>

        <div class="filter-item">
          <label for="startTimeInput">Start Time</label>
          <input id="startTimeInput" class="datetime-input w-190" type="datetime-local" />
        </div>

        <div class="filter-item">
          <label for="endTimeInput">End Time</label>
          <input id="endTimeInput" class="datetime-input w-190" type="datetime-local" />
        </div>

        <div class="filter-actions">
          <button id="searchBtn" class="btn btn-primary" type="button">Search</button>
          <button id="resetBtn" class="btn" type="button">Reset</button>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="table-wrapper">
        <table class="rur-table">
          <colgroup>
            <col class="col-id" />
            <col class="col-user-id" />
            <col class="col-create-time" />
            <col class="col-risk-score" />
            <col class="col-risk-level" />
            <col class="col-decision" />
            <col class="col-decision-source" />
            <col class="col-actions" />
          </colgroup>
          <thead>
            <tr>
              <th>ID</th>
              <th>User ID</th>
              <th>Create Time</th>
              <th>Risk Score</th>
              <th>Risk Level</th>
              <th>Decision</th>
              <th>Decision Source</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="tableBody">
            <tr>
              <td colspan="8" class="empty-text">No Data</td>
            </tr>
          </tbody>
        </table>
      </div>

      <div class="pagination-wrap">
        <div class="pagination-left">
          <span id="pageInfo" class="page-info">Total 0</span>
        </div>
        <div class="pagination-right">
          <span class="page-info">Page Size</span>
          <select id="pageSizeSelect" class="select-input w-90">
            <option value="10">10</option>
            <option value="20" selected>20</option>
            <option value="50">50</option>
            <option value="100">100</option>
          </select>
          <button id="prevBtn" class="btn" type="button">Prev</button>
          <button id="pageBtn" class="page-number active" type="button">1</button>
          <button id="nextBtn" class="btn" type="button">Next</button>
        </div>
      </div>
    </div>
  </div>

  <div id="loadingMask" class="loading-mask">Loading...</div>

  <div id="dialogMask" class="dialog-mask">
    <div class="dialog" role="dialog" aria-modal="true" aria-labelledby="dialogTitle">
      <div id="dialogTitle" class="dialog-header">Update Decision</div>
      <div class="dialog-body">
        <table class="desc-table">
          <tr>
            <th>Review ID</th>
            <td id="dialogReviewId">-</td>
          </tr>
          <tr>
            <th>User ID</th>
            <td id="dialogUserId">-</td>
          </tr>
          <tr>
            <th>Current Decision</th>
            <td id="dialogCurrentDecision">-</td>
          </tr>
        </table>

        <div class="form-row">
          <label for="newDecisionSelect">New Decision</label>
          <select id="newDecisionSelect" class="nice-select">
            <option value="">Select resolved decision</option>
            <option value="10">Resolved - Block</option>
            <option value="11">Resolved - Whitelist</option>
            <option value="12">Resolved - Watchlist</option>
          </select>
        </div>
      </div>
      <div class="dialog-footer">
        <button id="cancelDialogBtn" class="btn" type="button">Cancel</button>
        <button id="confirmDialogBtn" class="btn btn-primary" type="button">Confirm</button>
      </div>
    </div>
  </div>

  <div id="toastWrap" class="toast-wrap"></div>

  <script src="/admin-ms/v1/merchant/risk-user-reviews/risk_user_review_list.js?v=0.0.1"></script>
</body>
</html>
